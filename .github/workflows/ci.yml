name: CI

on:
  push:
  pull_request:

# Build-only gate for now. Each language step is guarded on the presence of its
# build file so the workflow stays green as the three skeletons land across
# phases. Test invocations are wired in during WS-1 Phase 4.
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "present=$([ -f rust/Cargo.toml ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.present == 'yes'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - if: steps.check.outputs.present == 'yes'
        working-directory: rust
        run: |
          cargo build
          cargo build --target wasm32-unknown-unknown

  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "present=$([ -f zig/build.zig ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.present == 'yes'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - if: steps.check.outputs.present == 'yes'
        working-directory: zig
        run: |
          zig build
          zig build -Dtarget=wasm32-freestanding

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "present=$([ -f cpp/CMakeLists.txt ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.present == 'yes'
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - if: steps.check.outputs.present == 'yes'
        working-directory: cpp
        run: |
          cmake -B build -S .
          cmake --build build
