name: CI

on:
  push:
  pull_request:

# Each language job builds its skeleton and runs its native test suite. The
# cross_skeleton job builds all three static libraries and runs the C harness
# against each (the ABI link test). Per-language jobs are guarded on the presence
# of their build file so the workflow stays green across the WS-1 phases.
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "present=$([ -f rust/Cargo.toml ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.present == 'yes'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - if: steps.check.outputs.present == 'yes'
        working-directory: rust
        run: |
          cargo build
          cargo build --target wasm32-unknown-unknown
          cargo test
          cargo clippy --all-targets -- -D warnings
          cargo fmt --check

  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "present=$([ -f zig/build.zig ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.present == 'yes'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - if: steps.check.outputs.present == 'yes'
        working-directory: zig
        run: |
          zig build
          zig build -Dtarget=wasm32-freestanding
          zig build test
          zig fmt --check src

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "present=$([ -f cpp/CMakeLists.txt ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.present == 'yes'
        run: sudo apt-get update && sudo apt-get install -y cmake clang clang-format
      - if: steps.check.outputs.present == 'yes'
        working-directory: cpp
        run: |
          cmake -B build -S .
          cmake --build build
          ctest --test-dir build --output-on-failure
          clang-format --dry-run --Werror $(find src include -name '*.cpp' -o -name '*.h')

  cross_skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "present=$([ -f tests/c_harness/run.sh ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.present == 'yes'
        uses: dtolnay/rust-toolchain@stable
      - if: steps.check.outputs.present == 'yes'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - if: steps.check.outputs.present == 'yes'
        run: sudo apt-get update && sudo apt-get install -y cmake clang
      - if: steps.check.outputs.present == 'yes'
        run: |
          ( cd rust && cargo build )
          ( cd zig && zig build )
          ( cd cpp && cmake -B build -S . && cmake --build build )
          bash tests/c_harness/run.sh
